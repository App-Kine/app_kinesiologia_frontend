<ion-header>
  <ion-toolbar style="text-align: center;">
    <ion-buttons slot="start" style="position: absolute; left: 0; z-index: 10;">
      <ion-menu-toggle>
        <ion-button [hidden]="hideMenu">
          <ion-icon name="menu-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>

    <div class="logo-header">
      <picture style="width: 90px">
        <img src="../../../../assets/images/logos/logo-uv-azul.png" />
      </picture>
    </div>
  </ion-toolbar>
</ion-header>
