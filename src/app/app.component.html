<ion-app>
  <ion-menu contentId="main-content" type="overlay" class="student-menu">
    <ion-content>
      <div class="menu-header-bg">
        <div class="profile-section">
          <ion-avatar>
            <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="Avatar del estudiante" />
          </ion-avatar>
          <h2>¡Hola, Estudiante!</h2>
          <ion-note>Nombre app</ion-note>
        </div>
      </div>

      <ion-list lines="none" class="menu-items">
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/tabs/home" routerDirection="root" routerLinkActive="selected">
            <ion-icon name="home-outline" slot="start"></ion-icon>
            <ion-label>Inicio</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/tabs/example-page-1" routerDirection="root" routerLinkActive="selected">
            <ion-icon name="information-circle-outline" slot="start"></ion-icon>
            <ion-label>Información</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
  
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
